.nav{background:var(--azul);display:flex;padding:0 20px;border-top:1px solid rgba(255,255,255,0.15);overflow-x:auto;position:sticky;top:68px;z-index:49}

.view{display:none}.view.on{display:block}
.grid-wrap{padding:20px}

.grid-n{font-size:9px;letter-spacing:2px;color:var(--gris);text-transform:uppercase}

.card{cursor:pointer}
.card-img{width:100%;aspect-ratio:3/4;background:var(--azul-bg);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:background 0.3s}
.card:hover .card-img{background:var(--azul-pale)}
.card-photo{width:100%;height:100%;object-fit:cover;transition:transform 0.4s}
.card:hover .card-photo{transform:scale(1.04)}
.card-emoji{font-size:44px;opacity:0.2}
.tag{position:absolute;top:8px;left:8px;font-size:7px;letter-spacing:2px;text-transform:uppercase;padding:2px 6px}
.tag-new{background:var(--marron);color:var(--blanco)}
.tag-last{background:transparent;border:1px solid var(--azul-dark);color:var(--azul-dark)}
.card-info{padding:8px 0 0}
.card-name{font-family:'Playfair Display',serif;font-size:12px;color:var(--marron);margin-bottom:1px;line-height:1.3}
.card-price{font-size:12px;font-weight:300;color:var(--texto)}

.card-cdot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(0,0,0,0.1)}
.detail-wrap{padding:20px 20px 60px}

// =============================================
// LÓGICA — no necesitás tocar nada de acá
// =============================================
let cat='todos', currentProduct=null;
const labels={todos:'Colección completa',pantalones:'Pantalones',remeras:'Remeras',buzos:'Buzos',camperas:'Camperas',camisas:'Camisas',vestidos:'Vestidos',accesorios:'Accesorios',calzado:'Calzado'};

function filtered(){return cat==='todos'?productos:productos.filter(p=>p.cat===cat)}

function renderGrid(){
  const items=filtered();
  document.getElementById('gridN').textContent=items.length+' prendas';
  document.getElementById('gridEl').innerHTML=items.map(p=>`
    <div class="card fade" onclick="openDetail(${p.id})">
      <div class="card-img">
        ${p.photos&&p.photos[0]?`<img class="card-photo" src="${p.photos[0]}" alt="${p.name}" loading="lazy">`:`<span class="card-emoji">${p.emoji}</span>`}
        ${p.tag==='nuevo'?'<span class="tag tag-new">Nuevo</span>':''}
        ${p.tag==='últimos'?'<span class="tag tag-last">Últimos</span>':''}
      </div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-price">${p.price}</div>
        <div class="card-sizes">${p.sizes.join(' · ')}</div>
        <div class="card-colors">${p.colors.map(c=>`<div class="card-cdot" style="background:${c}"></div>`).join('')}</div>
      </div>
    </div>
  `).join('');
}

document.getElementById('navEl').addEventListener('click',e=>{
  const btn=e.target.closest('.nbtn');if(!btn)return;
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');cat=btn.dataset.cat;
  document.getElementById('gridTitle').textContent=labels[cat]||cat;
  renderGrid();
});

function openDetail(id){
  const p=productos.find(x=>x.id===id);
  currentProduct=p;
  document.getElementById('dCat').textContent=p.cat.toUpperCase();
  document.getElementById('dName').textContent=p.name;
  document.getElementById('dPrice').textContent=p.price;
  document.getElementById('dDesc').textContent=p.desc;
  document.getElementById('videoName').textContent=p.name;

  // Imagen principal
  const mainImg=document.getElementById('mainImg');
  if(p.photos&&p.photos[0]){
    mainImg.innerHTML=`<img src="${p.photos[0]}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover">`;
  } else {
    mainImg.innerHTML=`<span style="font-size:72px;opacity:0.2">${p.emoji}</span>`;
  }

  // Miniaturas
  if(p.photos&&p.photos.length>1){
    document.getElementById('thumbsEl').innerHTML=p.photos.map((ph,i)=>
      `<div class="thumb ${i===0?'on':''}" onclick="setMainImg('${ph}',this)"><img src="${ph}" alt=""></div>`
    ).join('');
  } else {
    document.getElementById('thumbsEl').innerHTML='';
  }

  // Talles
  document.getElementById('sizesEl').innerHTML=p.sizes.map(s=>
    `<button class="sz" onclick="this.closest('.sizes').querySelectorAll('.sz').forEach(x=>x.classList.remove('on'));this.classList.add('on')">${s}</button>`
  ).join('');

  // Colores
  let ch=p.colors.map((c,i)=>
    `<div class="cdot-detail ${i===0?'on':''}" style="background:${c}" onclick="this.parentElement.querySelectorAll('.cdot-detail').forEach(x=>x.classList.remove('on'));this.classList.add('on');document.getElementById('colorName').textContent='${p.colorsNames[i]}'"></div>`
  ).join('');
  ch+=`<span class="color-name" id="colorName">${p.colorsNames[0]||''}</span>`;
  document.getElementById('colorsEl').innerHTML=ch;

  // WhatsApp con mensaje pre-armado
  const msg=encodeURIComponent(`Hola! Te consulto por la *${p.name}* (${p.price}) — disponible en Posta @posta.bb`);
  document.getElementById('btnWa').href=`https://wa.me/${WHATSAPP}?text=${msg}`;
  document.getElementById('btnConsultar').onclick=()=>window.open(`https://wa.me/${WHATSAPP}?text=${msg}`,'_blank');

  document.getElementById('gridView').classList.remove('on');
  document.getElementById('detailView').classList.add('on');
  document.getElementById('backBtn').classList.add('on');
  window.scrollTo(0,0);
}

function setMainImg(src,el){
  document.getElementById('mainImg').innerHTML=`<img src="${src}" alt="" style="width:100%;height:100%;object-fit:cover">`;
  document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
}

function goGrid(){
  document.getElementById('detailView').classList.remove('on');
  document.getElementById('gridView').classList.add('on');
  document.getElementById('backBtn').classList.remove('on');
}

renderGrid();
</script>
