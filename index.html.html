*{box-sizing:border-box;margin:0;padding:0}
:root{--azul:#7d9bc4;--azul-dark:#5a7ba8;--azul-pale:#c8d8ec;--azul-bg:#e8eef6;--marron:#4a2210;--marron-light:#7a4a30;--blanco:#f8f6f2;--gris:#a09880;--texto:#2a1a0e}

.back-btn{display:none;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:var(--blanco);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:6px 12px;cursor:pointer;transition:background 0.2s}

.nav{background:var(--azul);display:flex;padding:0 20px;border-top:1px solid rgba(255,255,255,0.15);overflow-x:auto;position:sticky;top:68px;z-index:49}
.nbtn{background:none;border:none;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);padding:11px 12px;cursor:pointer;transition:all 0.2s;white-space:nowrap;margin-bottom:-1px}
.nbtn:hover{color:rgba(255,255,255,0.8)}.nbtn.on{color:#fff;border-bottom-color:#fff}
.view{display:none}.view.on{display:block}
.grid-wrap{padding:20px}
.grid-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
.grid-title{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:var(--marron)}

.card{cursor:pointer}
.card-img{width:100%;aspect-ratio:3/4;background:var(--azul-bg);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:background 0.3s}

.tag{position:absolute;top:8px;left:8px;font-size:7px;letter-spacing:2px;text-transform:uppercase;padding:2px 6px}
.tag-new{background:var(--marron);color:var(--blanco)}
.tag-last{background:transparent;border:1px solid var(--azul-dark);color:var(--azul-dark)}
.card-info{padding:8px 0 0}
.card-name{font-family:'Playfair Display',serif;font-size:12px;color:var(--marron);margin-bottom:1px;line-height:1.3}
.card-price{font-size:12px;font-weight:300;color:var(--texto)}
.card-sizes{font-size:8px;letter-spacing:1px;color:var(--gris);margin-top:2px}

.card-cdot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(0,0,0,0.1)}

.d-cat{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--azul-dark);margin-bottom:5px}
.d-name{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.1;color:var(--marron);margin-bottom:4px}

// =============================================
// LÓGICA — no necesitás tocar nada de acá
// =============================================
let cat='todos', activeFilters={size:'',color:''  ,price:''};, currentProduct=null;
const labels={todos:'Colección completa',pantalones:'Pantalones',remeras:'Remeras',buzos:'Buzos',camperas:'Camperas',camisas:'Camisas',monoprendas:'Monoprendas',accesorios:'Accesorios',calzado:'Calzado'};

function filtered(){
  let items=cat==='todos'?productos:productos.filter(p=>p.cat===cat);
  if(activeFilters.size) items=items.filter(p=>p.sizes.map(String).includes(activeFilters.size));
  if(activeFilters.color) items=items.filter(p=>p.colorsNames.some(c=>c.toLowerCase()===activeFilters.color.toLowerCase()));
  if(activeFilters.price){const mx=parseInt(activeFilters.price);items=items.filter(p=>{try{return parseInt(p.price.replace(/[$\.]/g,''))<=mx;}catch{return true;}});}
  return items;
}

function renderGrid(){
  const items=filtered();
  document.getElementById('gridN').textContent=items.length+' prendas';
  const res=document.getElementById('filterResults');
  if(res) res.textContent=items.length+' prendas';
  document.getElementById('gridEl').innerHTML=items.map(p=>`
    <div class="card fade" onclick="openDetail(${p.id})">
      <div class="card-img">
        ${p.photos&&p.photos[0]?`<img class="card-photo" src="${p.photos[0]}" alt="${p.name}" loading="lazy">`:`<span class="card-emoji">${p.emoji}</span>`}
        ${p.tag==='nuevo'?'<span class="tag tag-new">Nuevo</span>':''}
        ${p.tag==='últimos'?'<span class="tag tag-last">Últimos</span>':''}
      </div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-price">${p.price}</div>
        <div class="card-sizes">${p.sizes.join(' · ')}</div>
        <div class="card-colors">${p.colors.map(c=>`<div class="card-cdot" style="background:${c}"></div>`).join('')}</div>
      </div>
    </div>
  `).join('');
}

document.getElementById('navEl').addEventListener('click',e=>{
  const btn=e.target.closest('.nbtn');if(!btn)return;
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');cat=btn.dataset.cat;
  document.getElementById('gridTitle').textContent=labels[cat]||cat;
  renderGrid();
});

function openDetail(id){
  const p=productos.find(x=>x.id===id);
  currentProduct=p;
  document.getElementById('dCat').textContent=p.cat.toUpperCase();
  document.getElementById('dName').textContent=p.name;
  document.getElementById('dPrice').textContent=p.price;
  document.getElementById('dDesc').textContent=p.desc;
  document.getElementById('videoName').textContent=p.name;

  // Imagen principal
  const mainImg=document.getElementById('mainImg');
  if(p.photos&&p.photos[0]){
    mainImg.innerHTML=`<img src="${p.photos[0]}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover">`;
  } else {
    mainImg.innerHTML=`<span style="font-size:72px;opacity:0.2">${p.emoji}</span>`;
  }

  // Miniaturas
  if(p.photos&&p.photos.length>1){
    document.getElementById('thumbsEl').innerHTML=p.photos.map((ph,i)=>
      `<div class="thumb ${i===0?'on':''}" onclick="setMainImg('${ph}',this)"><img src="${ph}" alt=""></div>`
    ).join('');
  } else {
    document.getElementById('thumbsEl').innerHTML='';
  }

  // Talles
  document.getElementById('sizesEl').innerHTML=p.sizes.map(s=>
    `<button class="sz" onclick="this.closest('.sizes').querySelectorAll('.sz').forEach(x=>x.classList.remove('on'));this.classList.add('on')">${s}</button>`
  ).join('');

  // Colores
  let ch=p.colors.map((c,i)=>
    `<div class="cdot-detail ${i===0?'on':''}" style="background:${c}" onclick="this.parentElement.querySelectorAll('.cdot-detail').forEach(x=>x.classList.remove('on'));this.classList.add('on');document.getElementById('colorName').textContent='${p.colorsNames[i]}'"></div>`
  ).join('');
  ch+=`<span class="color-name" id="colorName">${p.colorsNames[0]||''}</span>`;
  document.getElementById('colorsEl').innerHTML=ch;

  // WhatsApp con mensaje pre-armado
  const msg=encodeURIComponent(`Hola! Te consulto por la *${p.name}* (${p.price}) — disponible en Posta @posta.bb`);
  document.getElementById('btnWa').href=`https://wa.me/${WHATSAPP}?text=${msg}`;
  document.getElementById('btnConsultar').onclick=()=>window.open(`https://wa.me/${WHATSAPP}?text=${msg}`,'_blank');

  if(p.photos&&p.photos.length>0){ initSwipe(p.photos); } 
  document.getElementById('filterPanel').style.display='none';document.querySelector('.filter-bar').style.display='none';
  document.getElementById('gridView').classList.remove('on');
  document.getElementById('detailView').classList.add('on');
  document.getElementById('backBtn').classList.add('on');
  window.scrollTo(0,0);
}

function setMainImg(src,el){
  document.getElementById('mainImg').innerHTML=`<img src="${src}" alt="" style="width:100%;height:100%;object-fit:cover">`;
  document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
}

function goGrid(){
  document.querySelector('.filter-bar').style.display='flex';
  document.getElementById('detailView').classList.remove('on');
  document.getElementById('gridView').classList.add('on');
  document.getElementById('backBtn').classList.remove('on');
}

renderGrid();

// ── FILTROS ──
function applyFilters(){
  activeFilters.size=document.getElementById('filterSize').value;
  activeFilters.color=document.getElementById('filterColor').value;
  activeFilters.price=document.getElementById('filterPrice').value;
  const active=activeFilters.size||activeFilters.color||activeFilters.price;
  document.getElementById('filterDot').style.display=active?'inline':'none';
  renderGrid();
}
function clearFilters(){
  document.getElementById('filterSize').value='';
  document.getElementById('filterColor').value='';
  document.getElementById('filterPrice').value='';
  activeFilters={size:'',color:'',price:''};
  document.getElementById('filterDot').style.display='none';
  renderGrid();
}


// ── TOGGLE FILTROS ──
function toggleFilters(){
  const panel=document.getElementById('filterPanel');
  const btn=document.querySelector('.filter-toggle');
  const open=panel.style.display==='none';
  panel.style.display=open?'block':'none';
  btn.classList.toggle('active',open);
}
// ── SWIPE ──
let swipePhotos=[], swipeIdx=0, touchStartX=0;
function initSwipe(photos){
  swipePhotos=photos; swipeIdx=0;
  const wrap=document.getElementById('mainImg');
  wrap.classList.add('gallery-swipe');
  wrap.ontouchstart=e=>{ touchStartX=e.touches[0].clientX; };
  wrap.ontouchend=e=>{
    const dx=e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx)>40){ dx<0 ? nextPhoto() : prevPhoto(); }
  };
  renderSwipe();
}
function renderSwipe(){
  const p=swipePhotos[swipeIdx];
  document.getElementById('mainImg').innerHTML=`<img src="${p}" alt="" style="width:100%;height:100%;object-fit:cover">`;
  // dots
  let dots=document.getElementById('swipeDots');
  if(!dots){ dots=document.createElement('div'); dots.id='swipeDots'; dots.className='swipe-dots'; document.getElementById('mainImg').after(dots); }
  if(swipePhotos.length>1){
    dots.innerHTML=swipePhotos.map((_,i)=>`<div class="swipe-dot ${i===swipeIdx?'on':''}" onclick="goPhoto(${i})"></div>`).join('');
    dots.style.display='flex';
  } else { dots.style.display='none'; }
  // thumbs sync
  document.querySelectorAll('.thumb').forEach((t,i)=>{ t.classList.toggle('on',i===swipeIdx); });
}
function nextPhoto(){ if(swipeIdx<swipePhotos.length-1){swipeIdx++;renderSwipe();} }
function prevPhoto(){ if(swipeIdx>0){swipeIdx--;renderSwipe();} }
function goPhoto(i){ swipeIdx=i; renderSwipe(); }

</script>
